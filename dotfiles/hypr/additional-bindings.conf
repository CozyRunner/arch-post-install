#
# Additional & Utility Keybindings
# This file includes scripts, system utilities, and hardware overrides.
################################################################################

$mainMod = SUPER

# ------------------------------------------------------------------------------
# --- SYSTEM UTILITIES ---
# ------------------------------------------------------------------------------

# Session Management
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Escape, exec, ~/.config/hypr/scripts/power_menu.sh
bind = $mainMod SHIFT, Q, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Emergency Kill/Close All
bind = CONTROL ALT, Delete, exec, hyprctl clients -j | jq -r '.[].address' | xargs -I {} hyprctl dispatch closewindow address:{}

# ------------------------------------------------------------------------------
# --- USER SCRIPTS & MENUS ---
# ------------------------------------------------------------------------------

# Theme & UI Toggles
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard.sh
bind = $mainMod, N, exec, ~/.config/hypr/scripts/toggle_theme.sh
bind = $mainMod, M, exec, ~/.config/hypr/scripts/floating_menu.sh

# ------------------------------------------------------------------------------
# --- HARDWARE CONTROLS ---
# ------------------------------------------------------------------------------

# Manual Brightness Overrides (if XF86 keys aren't enough)
bindel = $mainMod, F1, exec, brightnessctl set 5%-
bindel = $mainMod, F2, exec, brightnessctl set 5%+

# Maintenance
bind = $mainMod, F5, exec, ~/.config/hypr/scripts/firmware_update.sh

# ------------------------------------------------------------------------------
# --- SCREENSHOTS (via grimblast) ---
# ------------------------------------------------------------------------------

# Save area to file and clipboard
bind = , Print, exec, grimblast --notify copysave area

# Save active window to file and clipboard
bind = ALT, Print, exec, grimblast --notify copysave active

# Save current monitor to file and clipboard
bind = SHIFT, Print, exec, grimblast --notify copysave output

