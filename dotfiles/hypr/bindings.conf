#
# Core Keybindings for Hyprland
# See https://wiki.hypr.land/Configuring/Binds/
################################################################################

$mainMod = SUPER

# ------------------------------------------------------------------------------
# --- APPLICATIONS & WINDOWS CONTROLS ---
# ------------------------------------------------------------------------------

# Launch Terminals
bind = $mainMod, RETURN, exec, $terminal2
bind = $mainMod, Q, exec, $terminal

# Launch Browser & File Manager (Win + E = Explorer)
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager

# Application Launchers & Settings (Win + R = Run, Win + I = Settings)
bind = $mainMod, R, exec, $menu
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, I, exec, ~/.config/hypr/scripts/floating_menu.sh

# Task Manager & Clipboard (Ctrl + Shift + Esc = Task Manager, Win + V = Clipboard)
bind = CONTROL SHIFT, Escape, exec, $terminal -e btop
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard.sh

# ------------------------------------------------------------------------------
# --- WINDOW MANAGEMENT ---
# ------------------------------------------------------------------------------

# Basic Window Operations (Alt + F4 = Close Window)
bind = ALT, F4, killactive
bind = $mainMod, C, killactive
bind = $mainMod SHIFT, V, togglefloating
bind = $mainMod, T, pin
bind = $mainMod, BACKSPACE, centerwindow

# Fullscreen & Maximize Modes (Win + Up = Maximize, Win + Down = Restore)
bind = $mainMod, F, fullscreen, 0      # Full fullscreen
bind = $mainMod ALT, F, fullscreen, 1  # Maximize (keep bars)
bind = $mainMod, Up, fullscreen, 1     # Win + Up (Maximize window)
bind = $mainMod, Down, fullscreen, 0   # Win + Down (Restore/unmaximize)

# Layout Control
bind = $mainMod, P, pseudo,            # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# ------------------------------------------------------------------------------
# --- NAVIGATION & FOCUS ---
# ------------------------------------------------------------------------------

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move active window with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Windows Alt + Tab Window Switching
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,
bind = ALT SHIFT, Tab, cyclenext, prev
bind = ALT SHIFT, Tab, bringactivetotop,

# Super + Tab cycle navigation
bind = $mainMod, Tab, cyclenext,
bind = $mainMod, Tab, bringactivetotop,

# ------------------------------------------------------------------------------
# --- WORKSPACE MANAGEMENT & VIRTUAL DESKTOPS ---
# ------------------------------------------------------------------------------

# Windows Virtual Desktop Navigation (Ctrl + Win + Left/Right/D/F4)
bind = CONTROL $mainMod, left, workspace, e-1   # Switch to left virtual desktop
bind = CONTROL $mainMod, right, workspace, e+1  # Switch to right virtual desktop
bind = CONTROL $mainMod, D, workspace, empty    # Create/switch to new virtual desktop
bind = CONTROL $mainMod, F4, killactive         # Close current virtual desktop app

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod ALT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ------------------------------------------------------------------------------
# --- MOUSE BINDINGS ---
# ------------------------------------------------------------------------------

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
