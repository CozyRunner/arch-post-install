# Dark Theme Configuration
# Catppuccin Mocha Green Theme

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # Active border gradient
    col.active_border = rgba(a6e3a1ff) rgba(94e2d5ff) 45deg

    # Inactive borders
    col.inactive_border = rgba(313244aa)

    resize_on_border = true
}

decoration {
    rounding = 10

    shadow {
        enabled = true
        range = 20
        render_power = 3

        # Catppuccin crust shadow
        color = rgba(11111baa)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        ignore_opacity = true

        # Optional for glassy look
        new_optimizations = true
    }
}

# Blur selected windows
blurls = rofi
blurls = wlogout




























